services:
  db:
    image: postgres:16-alpine
    container_name: threadlite-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threadlite}
      POSTGRES_USER: ${POSTGRES_USER:-threadlite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threadlite}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threadlite} -d ${POSTGRES_DB:-threadlite}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    container_name: threadlite-backend
    restart: unless-stopped
    working_dir: /workspace/apps/api
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://threadlite:threadlite@db:5432/threadlite}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -lc "
      apt-get update &&
      apt-get install -y --no-install-recommends build-essential curl libpq-dev &&
      rm -rf /var/lib/apt/lists/* &&
      python -m pip install --no-cache-dir --upgrade pip &&
      if [ -f requirements.txt ]; then
        pip install --no-cache-dir -r requirements.txt;
      elif [ -f pyproject.toml ]; then
        pip install --no-cache-dir -e .;
      else
        pip install --no-cache-dir fastapi 'uvicorn[standard]' sqlmodel alembic psycopg[binary] pydantic;
      fi &&
      if [ -f alembic.ini ]; then
        alembic upgrade head;
      fi &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: node:20-alpine
    container_name: threadlite-web
    restart: unless-stopped
    working_dir: /workspace/apps/web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      PORT: 3000
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
      - web_next_cache:/workspace/apps/web/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: >
      sh -lc "
      corepack enable &&
      if [ -f package-lock.json ]; then
        npm ci;
      elif [ -f pnpm-lock.yaml ]; then
        pnpm install --frozen-lockfile;
      elif [ -f yarn.lock ]; then
        yarn install --frozen-lockfile;
      else
        npm install;
      fi &&
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "

volumes:
  postgres_data:
  web_node_modules:
  web_next_cache:
